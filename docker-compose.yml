services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 15
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # Database Migrations (run once then exit)
  # ---------------------------------------------------------------------------
  migrations:
    build:
      context: .
      dockerfile: migrations/Dockerfile
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Auth Service
  # ---------------------------------------------------------------------------
  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    env_file: .env
    ports:
      - "${AUTH_SERVICE_PORT:-8001}:8000"
    depends_on:
      migrations:
        condition: service_completed_successfully
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Model Service
  # ---------------------------------------------------------------------------
  model-service:
    build:
      context: .
      dockerfile: model-service/Dockerfile
    env_file: .env
    ports:
      - "${MODEL_SERVICE_PORT:-8002}:8000"
    volumes:
      - model-storage:/app/storage
    depends_on:
      migrations:
        condition: service_completed_successfully
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Prediction Service (Scaled & Internal Only)
  # ---------------------------------------------------------------------------
  prediction-service:
    build:
      context: .
      dockerfile: prediction-service/Dockerfile
    env_file: .env
    volumes:
      - model-storage:/app/storage:ro
    depends_on:
      migrations:
        condition: service_completed_successfully
    restart: unless-stopped
    deploy:
      replicas: 4

  # ---------------------------------------------------------------------------
  # Nginx API Gateway
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    ports:
      - "9000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - model-service
      - prediction-service
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Observability Stack (Prometheus & Grafana)
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    restart: unless-stopped
    volumes:
      - grafana-data:/var/lib/grafana

  # ---------------------------------------------------------------------------
  # Redis Cache
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

# ✅ THIS is the block that went missing! 
volumes:
  pgdata:
  model-storage:
  grafana-data:
