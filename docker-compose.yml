services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 15
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # Database Migrations (run once then exit)
  # ---------------------------------------------------------------------------
  migrations:
    build:
      context: .
      dockerfile: migrations/Dockerfile
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Auth Service
  # ---------------------------------------------------------------------------
  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    env_file: .env
    ports:
      - "${AUTH_SERVICE_PORT:-8001}:8000"
    depends_on:
      migrations:
        condition: service_completed_successfully
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Model Service
  # ---------------------------------------------------------------------------
  model-service:
    build:
      context: .
      dockerfile: model-service/Dockerfile
    env_file: .env
    ports:
      - "${MODEL_SERVICE_PORT:-8002}:8000"
    volumes:
      - model-storage:/app/storage
    depends_on:
      migrations:
        condition: service_completed_successfully
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Prediction Service
  # ---------------------------------------------------------------------------
  prediction-service:
    build:
      context: .
      dockerfile: prediction-service/Dockerfile
    env_file: .env
    ports:
      - "${PREDICTION_SERVICE_PORT:-8003}:8000"
    volumes:
      - model-storage:/app/storage:ro
    depends_on:
      migrations:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  pgdata:
  model-storage:
