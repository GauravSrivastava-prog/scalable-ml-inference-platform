events {}

http {
    # ALLOW MASSIVE DATASET UPLOADS (Up to 100MB)
    client_max_body_size 100M;
    
    # ── Note: Removed upstreams because Render handles its own load balancing behind their URLs ──

    server {
        listen 80;

        # ── Route: Auth Service ────────────────────────────
        location /api/v1/auth/ {
            # 1. Handle Preflight OPTIONS
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '$http_origin' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Max-Age' 86400;
                add_header 'Content-Length' 0;
                return 204;
            }

            # 2. Inject CORS on real responses
            add_header 'Access-Control-Allow-Origin' '$http_origin' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;

            # 3. Cloud Proxy Settings
            proxy_pass https://ml-auth-service.onrender.com;
            proxy_ssl_server_name on; # Required for Render routing
            proxy_set_header Host ml-auth-service.onrender.com;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Route: Model Service ───────────────────────────
        location /api/v1/models/ {
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '$http_origin' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Max-Age' 86400;
                add_header 'Content-Length' 0;
                return 204;
            }
            add_header 'Access-Control-Allow-Origin' '$http_origin' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;

            proxy_pass https://scalable-ml-inference-platform.onrender.com;
            proxy_ssl_server_name on;
            proxy_set_header Host scalable-ml-inference-platform.onrender.com;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Route: Prediction Service ──────────────────────
        location /api/v1/predictions/ {
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '$http_origin' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Max-Age' 86400;
                add_header 'Content-Length' 0;
                return 204;
            }
            # THE SLEDGEHAMMER: Strip any CORS header the Python backend sends
            proxy_hide_header Access-Control-Allow-Origin;
            
            add_header 'Access-Control-Allow-Origin' '$http_origin' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;

            # 🚨 Fixed Semicolon and matching Host header
            proxy_pass https://ml-prediction-service-m7xo.onrender.com;
            proxy_ssl_server_name on;
            proxy_set_header Host ml-prediction-service-m7xo.onrender.com;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}